<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema POS para Heladería - Registro rápido de ventas y cuadre de caja" />
  <title>🍦 Heladería POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">🍦</span>
        <h1 class="logo-text">Heladería<span>POS</span></h1>
      </div>
      <ul class="nav-menu">
        <li>
          <button class="nav-btn active" data-page="ventas">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Ventas</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="cuadre">
            <span class="nav-icon">💰</span>
            <span class="nav-label">Cuadre de Caja</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="historial">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Historial</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="reportes">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Reportes</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="productos">
            <span class="nav-icon">🍨</span>
            <span class="nav-label">Productos</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="estadisticas">
            <span class="nav-icon">📈</span>
            <span class="nav-label">Estadísticas</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="gastos">
            <span class="nav-icon">💸</span>
            <span class="nav-label">Gastos</span>
          </button>
        </li>
        <li>
          <button class="nav-btn" data-page="cocina">
            <span class="nav-icon">👨‍🍳</span>
            <span class="nav-label">Pantalla de Cocina</span>
          </button>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="apertura-status" id="apertura-status"></div>
        <div class="clock" id="sidebar-clock"></div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Payment Modal -->
  <div id="payment-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>💰 Método de Pago</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-product-info">
        <span id="modal-product-name"></span>
        <span id="modal-product-price"></span>
      </div>
      <div class="payment-buttons">
        <button class="payment-btn payment-cash" data-method="efectivo">
          <span class="payment-icon">💵</span>
          <span>Efectivo</span>
        </button>
        <button class="payment-btn payment-card" data-method="tarjeta">
          <span class="payment-icon">💳</span>
          <span>Tarjeta</span>
        </button>
        <button class="payment-btn payment-transfer" data-method="transferencia">
          <span class="payment-icon">📱</span>
          <span>Transferencia</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal (custom styled, replaces browser confirm) -->
  <div id="confirm-modal" class="modal-overlay" style="display:none;">
    <div class="modal confirm-modal-box">
      <div class="confirm-modal-icon" id="confirm-icon">⚠️</div>
      <h3 class="confirm-modal-title" id="confirm-title">¿Estás seguro?</h3>
      <p class="confirm-modal-message" id="confirm-message">Esta acción no se puede deshacer.</p>
      <div class="confirm-modal-details" id="confirm-details"></div>
      <div class="confirm-modal-actions">
        <button class="btn btn-ghost btn-lg" id="confirm-cancel-btn">Cancelar</button>
        <button class="btn btn-danger btn-lg" id="confirm-ok-btn">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" style="display:none;"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
